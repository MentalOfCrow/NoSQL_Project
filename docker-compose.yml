services:
  neo4j:
    image: neo4j:5-community
    container_name: cybercorp-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/cybercorp123
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p cybercorp123 'RETURN 1;' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  app:
    build: .
    container_name: cybercorp-app
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: cybercorp123
      AUTO_SEED: "true"

volumes:
  neo4j-data:
  neo4j-logs:
